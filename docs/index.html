    <!-- Safe-area insets (Dynamic Island / notch / home indicator) -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }

      /* Apply safe area padding to the app root */
      body {
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      /* Bottom tab bar must sit above the home indicator area */
      .bottom-tab-bar {
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }

      /* Fixed top elements (headers, banners) must clear the Dynamic Island */
      .top-header {
        padding-top: calc(12px + env(safe-area-inset-top));
      }

      /* Modals and full-screen overlays must also respect safe areas */
      .modal-container {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
